<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>8G Grimoire</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: radial-gradient(circle at top, #1a002b, #000);
  color: white;
  text-align: center;
  overflow-x: hidden;
  position: relative;
}

/* ⭐ BINTANG HALUS */
body::before {
  content: "";
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 200%;
  background: url('https://www.transparenttextures.com/patterns/stardust.png');
  opacity: 0.4;
  z-index: -1;
  animation: moveBg 100s linear infinite;
}

/* 🌌 GERAK PELAN */
@keyframes moveBg {
  from { transform: translateY(0); }
  to { transform: translateY(-1000px); }
}
  
  /* ✨ JUDUL */
h1 {
  margin-top: 30px;
  font-size: 40px;
  color: #d8aaff;
  animation: glow 2s infinite alternate;
}

@keyframes glow {
  from { text-shadow: 0 0 10px #a855f7; }
  to { text-shadow: 0 0 30px #ff00ff; }
}

/* 📦 GRID */
.container {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 15px;
  padding: 20px;
}

/* 🧾 CARD */
.card {
  background: rgba(255,255,255,0.1);
  padding: 15px;
  border-radius: 15px;
  backdrop-filter: blur(10px);
  cursor: pointer;
  animation: fadeIn 1s ease forwards;
  transition: 0.3s;
}

/* ✨ HOVER */
.card:hover {
  transform: scale(1.1) rotate(1deg);
  box-shadow: 0 0 25px #a855f7;
}

/* 🌟 FADE */
@keyframes fadeIn {
  from {
    opacity: 0;
    transform: translateY(20px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

/* 🔮 PROFILE POPUP */
.popup {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.8);
  display: none;
  justify-content: center;
  align-items: center;
  animation: fadeIn 0.5s;
}

.popup-content {
  background: #1a002b;
  padding: 20px;
  border-radius: 15px;
  width: 300px;
  box-shadow: 0 0 20px #a855f7;
  animation: pop 0.4s ease;
}

@keyframes pop {
  from { transform: scale(0.5); }
  to { transform: scale(1); }
}

button {
  margin-top: 15px;
  padding: 10px;
  border: none;
  background: #a855f7;
  color: white;
  border-radius: 10px;
  cursor: pointer;
}
</style>
</head>

<body>

<h1>🔮 8G Grimoire 🔮</h1>

  <div class="popup-content" id="popupContent"></div>
